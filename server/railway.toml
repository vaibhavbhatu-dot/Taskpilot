# Railway config-as-code for the TaskPilot API.
# Set this service's Root Directory to "server" in the Railway dashboard so
# Railway reads this file. DATABASE_URL is injected automatically once you add
# the PostgreSQL plugin to the project.

[build]
builder = "NIXPACKS"
# Nixpacks runs `npm ci` (incl. devDeps) before this command.
buildCommand = "npx prisma generate && npm run build"

[deploy]
# Runs once per deploy, before the new version goes live. Syncs the DB schema to
# the current prisma/schema.prisma and seeds the demo users (seed is idempotent —
# every row is an upsert, so re-running is safe).
preDeployCommand = "npx prisma db push --accept-data-loss && npm run seed"
startCommand = "node dist/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
